name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Maintains a release PR with a generated changelog and a semver bump
      # derived from Conventional Commit history. The default GITHUB_TOKEN is
      # enough to open and update that PR; swap in a PAT only if a release tag
      # must trigger other workflows.
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
